<!DOCTYPE html>
<html>
<head>
    <title>AR Test - Backend GLB Viewer</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; }
        model-viewer { width: 100%; height: 100vh; background: #222; }
    </style>
</head>
<body>
    <!-- Replace MODEL_URL with backend/models/your-project.glb -->
    <model-viewer src="models/test.glb" ar camera-controls ios-src="" auto-rotate ar-modes="webxr scene-viewer quick-look" shadow-intensity="1" exposure="1" environment-image="neutral" loading="eager">
        <button slot="ar-button" id="ar-button">Enter AR</button>
    </model-viewer>
    <script>
        const modelViewer = document.querySelector('model-viewer');
        const a = document.querySelector('#ar-button');
        a.addEventListener('click', () => modelViewer.activateAR());
    </script>
</body>
</html>

<!-- Phone test: Serve server, process model → open http://IP:5000/test_ar_viewer.html, replace src="models/test.glb" with your URL -->
